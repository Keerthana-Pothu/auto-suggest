<!DOCTYPE html>
<html>
<head>
    <title>Auto Suggest</title>
</head>
<body>

    <div>

        <p>
            &#9881; &bull; online |
            &#128339; - ms
        </p>

        <h1>BeingInfinity</h1>

        <p>
            One million phrases. Four algorithms.
            Prefix Based Auto Suggest.
        </p>

        <div>
            <span>&#128269;</span>

            <input
                type="text"
                id="search"
                placeholder="Start typing to search phrases..."
                onkeyup="suggest()"
                autocomplete="off"
            >
        </div>

        <div id="suggestions"></div>

    </div>

   

    <script>
        const phrases = [
            "apple",
            "application",
            "apply",
            "array",
            "algorithm",
            "banana",
            "ball",
            "bat",
            "binary search",
            "car",
            "cat",
            "coding",
            "computer",
            "data",
            "elephant",
            "fish",
            "grape",
            "hat",
            "ice cream",
            "jungle",
            "kangaroo",
            "lemon",
            "monkey",
            "notebook",
            "orange",
            "penguin",
            "quilt",
            "rabbit",
            "strawberry",
            "tiger",
            "umbrella",
            "violin",
            "watermelon",
            "xylophone",
            "yogurt",
            "zebra"




        ];

        function suggest() {
            let text = document.getElementById("search").value.toLowerCase();
            let box = document.getElementById("suggestions");

            box.innerHTML = "";

            if (text === "") return;

            for (let i = 0; i < phrases.length; i++) {
                if (phrases[i].startsWith(text)) {
                    let div = document.createElement("div");
                    div.innerHTML = phrases[i];
                    box.appendChild(div);
                }
            }
        }
    </script>

</body>
</html>
