<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donor Dashboard</title>
<link rel="stylesheet" href="css/style.css">

<style>
body{
    background:#f5fff8;
}

.container{
    width:80%;
    margin:30px auto;
}

h1{
    text-align:center;
    color:#16a34a;
    margin-bottom:20px;
}

form{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:15px;
    background:#16a34a;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#15803d;
}
</style>

</head>
<body>

<div class="container">

<h1>Donate Food</h1>

<form>

<input type="text" id="restaurant" placeholder="Restaurant Name">

<input type="text" id="food" placeholder="Food Name">

<input type="number" id="quantity" placeholder="Quantity">

<input type="datetime-local" id="pickup">

<input type="text" id="location" placeholder="Pickup Location">

<input type="tel" id="phone" placeholder="Phone Number">

<textarea id="description" placeholder="Description"></textarea>

<button type="button" onclick="saveDonation()">
Donate Food
</button>

</form>

</div>

<script src="js/donor.js"></script>

</body>
</html>
