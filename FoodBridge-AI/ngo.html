<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NGO Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
    background:#f5fff8;
}

h1{
    text-align:center;
    color:#16a34a;
    margin:30px;
}

#donationList{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card h2{
    color:#16a34a;
}

button{
    margin-top:15px;
    width:100%;
    padding:12px;
    border:none;
    background:#16a34a;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#15803d;
}

</style>

</head>

<body>

<h1>Available Food Donations</h1>

<div id="donationList"></div>

<script src="js/ngo.js"></script>

</body>
</html>
