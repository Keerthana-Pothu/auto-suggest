<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodBridge AI | Sign Up</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f0fff4;
}

.signup-container{
width:400px;
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
text-align:center;
}

.signup-container h1{
color:#16a34a;
margin-bottom:25px;
}

input,select{
width:100%;
padding:14px;
margin:12px 0;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
background:#16a34a;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#15803d;
}

a{
color:#16a34a;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="signup-container">

<h1>Create Account</h1>

<input
type="text"
id="name"
placeholder="Full Name">

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<select id="role">
<option value="">Select Role</option>
<option value="donor">Food Donor</option>
<option value="ngo">NGO / Volunteer</option>
</select>

<button onclick="signup()">
Sign Up
</button>

<p style="margin-top:20px;">
Already have an account?

<a href="login.html">
Login
</a>

</p>

</div>

<script src="js/auth.js"></script>

</body>
</html>
